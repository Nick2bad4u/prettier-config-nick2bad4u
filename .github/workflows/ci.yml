name: "Continuous Integration"

run-name: "Continuous Integration • ${{ github.ref_name }} @${{ github.actor }}"

concurrency:
    group: "ci-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

on:
    push:
        branches:
            - "main"
    pull_request:
    merge_group:
        types:
            - "checks_requested"

jobs:
    test:
        name: "Test (${{ matrix.label }})"
        runs-on: "${{ matrix.os }}"
        timeout-minutes: 60
        permissions:
            contents: "read"
            id-token: "write"
        strategy:
            fail-fast: true
            matrix:
                include:
                    - label: "linux"
                      os: "ubuntu-latest"
                      codecov_flag: "os-linux"
                    - label: "windows"
                      os: "windows-latest"
                      codecov_flag: "os-windows"
                    - label: "macos"
                      os: "macos-latest"
                      codecov_flag: "os-macos"
        defaults:
            run:
                shell: "bash"

        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              if: "${{ matrix.os == 'ubuntu-latest' }}"
              uses: "step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e" # v2.14.2
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

            - name: "Setup Node.js"
              uses: "actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238" # v6.2.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci --force"

            - name: "Build package"
              run: "npm run build"

            - name: "Verify package root shims are unchanged by build"
              run: |
                  if ! git diff --quiet -- preset.mjs prettier.config.mjs index.d.ts prettier.config.d.mts; then
                    echo "Package root shims changed during build. Keep shims checked in and generated output under dist/." >&2
                    git diff -- preset.mjs prettier.config.mjs index.d.ts prettier.config.d.mts
                    exit 1
                  fi

            - name: "Upload bundle analysis to Codecov"
              if: "${{ matrix.os == 'ubuntu-latest' && !cancelled() }}"
              continue-on-error: true
              run: "npx @codecov/bundle-analyzer ./dist --bundle-name=${{ github.event.repository.name }}"
              env:
                  GITHUB_SHA: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
                  GITHUB_REF: "${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref) || github.ref }}"

            - name: "Typecheck"
              run: "npm run typecheck"

            - name: "Run tests with coverage and JUnit report"
              run: "npx vitest run --coverage --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent"
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  PRETTIER_PLUGIN_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: "Verify coverage artifact"
              run: >-
                  python -c "from pathlib import Path; assert Path('coverage/lcov.info').is_file(), 'coverage/lcov.info was not generated'"

            - name: "Verify JUnit artifact"
              run: >-
                  python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: "Upload test results to Codecov"
              if: "${{ !cancelled() }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  files: "test-report.junit.xml"
                  flags: "${{ matrix.codecov_flag }}"
                  name: "vitest-junit-${{ matrix.codecov_flag }}"
                  report_type: "test_results"
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: "Upload coverage to Codecov"
              if: "${{ !cancelled() }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  files: "./coverage/lcov.info"
                  flags: "${{ matrix.codecov_flag }}"
                  name: "vitest-unit-coverage-${{ matrix.codecov_flag }}"
                  report_type: "coverage"
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

    verify:
        name: "Verify pipeline"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        permissions:
            contents: "read"
        defaults:
            run:
                shell: "bash"

        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40" # v2.19.0
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

            - name: "Setup Node.js"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"
                  node-version-file: ".node-version"

            - name: "Install dependencies"
              run: "npm ci --force"

            - name: "Run full verification pipeline"
              run: "npm run release:verify"
